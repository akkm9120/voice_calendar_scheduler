<!DOCTYPE html>
<html>

<head>
  <style>
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --bg-tertiary: #0f0f0f;
      --text-primary: #f5f5f5;
      --text-secondary: #b0b0b0;
      --text-muted: #808080;
      --border-color: #404040;
      --success-bg: #1a3a2a;
      --success-text: #4ade80;
      --danger-bg: #3a1a1a;
      --danger-text: #ff6b6b;
    }

    body {
      font-family: var(--font-sans);
      margin: 0;
      padding: 0;
      background: var(--bg-tertiary);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .header p {
      margin: 0;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      align-items: center;
      flex-wrap: wrap;
    }

    .mic-button {
      padding: 12px 20px;
      border: 0.5px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .mic-button:hover {
      background: #383838;
      border-color: #505050;
    }

    .mic-button:active {
      transform: scale(0.98);
    }

    .mic-button.recording {
      background: #4a1f1f;
      color: var(--danger-text);
      border-color: #603030;
    }

    .clear-button {
      padding: 12px 20px;
      border: 0.5px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-button:hover {
      background: #383838;
      border-color: #505050;
    }

    .status {
      font-size: 13px;
      color: var(--text-muted);
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--bg-secondary);
    }

    .status.active {
      color: var(--success-text);
    }

    .transcript-box {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 13px;
      min-height: 40px;
      color: var(--text-secondary);
    }

    .calendar {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .calendar-header h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .month-nav {
      display: flex;
      gap: 8px;
    }

    .month-nav button {
      padding: 6px 12px;
      border: 0.5px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-primary);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    .month-nav button:hover {
      background: #383838;
      border-color: #505050;
    }

    .weekdays {
      font-weight: bold;
      font-size: 20px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .weekday {
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      padding: 8px 0;
    }

    .dates {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .date-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0.5px solid var(--border-color);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      background: var(--bg-primary);
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .date-cell:hover:not(.empty) {
      border-color: var(--success-text);
    }

    .date-cell.empty {
      border: none;
      background: transparent;
      cursor: default;
    }

    .date-cell.free {
      background: var(--success-bg);
      color: var(--success-text);
      font-weight: 500;
      border-color: #4a6f4a;
    }

    .date-cell.free:hover {
      background: #1d4a30;
    }

    .free-list {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
    }

    .free-list h3 {
      margin: 0 0 12px 0;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .free-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .free-item {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text-primary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .free-item-text {
      flex: 1;
    }

    .free-item-remove {
      background: none;
      border: none;
      color: var(--danger-text);
      cursor: pointer;
      font-size: 16px;
      padding: 0 8px;
      transition: all 0.2s;
    }

    .free-item-remove:hover {
      color: #ff8888;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h2>Voice Calendar Scheduler</h2>
      <p>Say your free days and we'll mark them on the calendar (saves automatically)</p>
    </div>

    <div class="controls">
      <button class="mic-button" id="micBtn" onclick="toggleMicrophone()">
        <span id="micIcon">🎤</span>
        <span id="micText">Start listening</span>
      </button>
      <div class="status" id="status">Ready to listen</div>
      <button class="clear-button" onclick="clearAll()">Clear all</button>
    </div>

    <div class="transcript-box" id="transcript">Click start listening and tell me your free days...</div>

    <div class="calendar">
      <div class="calendar-header">
        <h3 id="monthYear">January 2026</h3>
        <div class="month-nav">
          <button onclick="previousMonth()">← Prev</button>
          <button onclick="nextMonth()">Next →</button>
        </div>
      </div>

      <div class="weekdays">
        <div class="weekday">Sun</div>
        <div class="weekday">Mon</div>
        <div class="weekday">Tue</div>
        <div class="weekday">Wed</div>
        <div class="weekday">Thu</div>
        <div class="weekday">Fri</div>
        <div class="weekday">Sat</div>
      </div>

      <div class="dates" id="calendarDates"></div>
    </div>

    <div class="free-list">
      <h3>Your free days</h3>
      <div class="free-items" id="freeItems">
        <div class="empty-state">No free days added yet</div>
      </div>
    </div>
  </div>

  <script>
    // Levenshtein distance for fuzzy matching
    function levenshteinDistance(a, b) {
      const matrix = [];
      for (let i = 0; i <= b.length; i++) {
        matrix[i] = [i];
      }
      for (let j = 0; j <= a.length; j++) {
        matrix[0][j] = j;
      }
      for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
          if (b.charAt(i - 1) === a.charAt(j - 1)) {
            matrix[i][j] = matrix[i - 1][j - 1];
          } else {
            matrix[i][j] = Math.min(
              matrix[i - 1][j - 1] + 1,
              matrix[i][j - 1] + 1,
              matrix[i - 1][j] + 1
            );
          }
        }
      }
      return matrix[b.length][a.length];
    }

    // Fuzzy match with threshold
    function fuzzyMatch(input, options, threshold = 2) {
      let bestMatch = null;
      let bestDistance = threshold;

      for (const option of options) {
        const distance = levenshteinDistance(input.toLowerCase(), option.toLowerCase());
        if (distance < bestDistance) {
          bestDistance = distance;
          bestMatch = option;
        }
      }
      return bestMatch;
    }

    let recognition = null;
    let isListening = false;
    let freeDays = [];
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    const STORAGE_KEY = 'voiceCalendar_freeDays';

    // Load from localStorage
    function loadFromStorage() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          freeDays = JSON.parse(stored);
          renderCalendar();
          updateFreeList();
        } catch (e) {
          console.error('Failed to load from storage:', e);
        }
      }
    }

    // Save to localStorage
    function saveToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(freeDays));
    }

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.lang = 'en-US';
      recognition.interimResults = true;

      recognition.onstart = function () {
        isListening = true;
        updateMicButton();
        document.getElementById('status').textContent = 'Listening...';
        document.getElementById('status').classList.add('active');
      };

      recognition.onresult = function (event) {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        document.getElementById('transcript').textContent = transcript;
        extractFreeDays(transcript);
        renderCalendar();
        updateFreeList();
      };

      recognition.onerror = function (event) {
        document.getElementById('status').textContent = 'Error: ' + event.error;
        document.getElementById('status').classList.remove('active');
      };

      recognition.onend = function () {
        isListening = false;
        updateMicButton();
        document.getElementById('status').textContent = 'Ready to listen';
        document.getElementById('status').classList.remove('active');
      };
    }

    function toggleMicrophone() {
      if (!recognition) {
        alert('Speech recognition not supported in this browser');
        return;
      }

      if (isListening) {
        recognition.stop();
      } else {
        document.getElementById('transcript').textContent = '';
        recognition.start();
      }
    }

    function updateMicButton() {
      const btn = document.getElementById('micBtn');
      const icon = document.getElementById('micIcon');
      const text = document.getElementById('micText');

      if (isListening) {
        btn.classList.add('recording');
        icon.textContent = '⏹';
        text.textContent = 'Stop listening';
      } else {
        btn.classList.remove('recording');
        icon.textContent = '🎤';
        text.textContent = 'Start listening';
      }
    }

    function extractFreeDays(text) {
      const monthNames = ['january', 'february', 'march', 'april', 'may', 'june',
        'july', 'august', 'september', 'october', 'november', 'december'];

      const dayNames = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];

      const monthMap = {};
      const dayMap = {};
      monthNames.forEach((name, idx) => monthMap[name] = idx);
      dayNames.forEach((name, idx) => dayMap[name] = idx);

      // Extract dates like "january 15", "jan 15", or fuzzy matches
      const datePattern = /(\w+)\s+(\d{1,2})(?:st|nd|rd|th)?/gi;
      let match;
      while ((match = datePattern.exec(text)) !== null) {
        const monthWord = match[1].toLowerCase();
        const day = parseInt(match[2]);

        // Fuzzy match for month name
        const matchedMonth = fuzzyMatch(monthWord, monthNames, 3);
        const month = monthMap[matchedMonth];

        if (month !== undefined && day >= 1 && day <= 31) {
          addFreeDay(currentYear, month, day);
        }
      }

      // Extract day names like "monday", "next friday", "munday", "fridee", etc.
      const dayPattern = /(?:next\s+)?(\w+day)/gi;
      while ((match = dayPattern.exec(text)) !== null) {
        const dayWord = match[1].toLowerCase();

        // Fuzzy match for day name
        const matchedDay = fuzzyMatch(dayWord, dayNames, 2);
        const targetDayOfWeek = dayMap[matchedDay];

        if (targetDayOfWeek !== undefined) {
          const nextDate = getNextOccurrenceOfDay(targetDayOfWeek);
          addFreeDay(nextDate.getFullYear(), nextDate.getMonth(), nextDate.getDate());
        }
      }

      // Extract standalone numbers
      const numberPattern = /\b(\d{1,2})(?:st|nd|rd|th)?\b/g;
      const foundDates = [];
      while ((match = numberPattern.exec(text)) !== null) {
        const day = parseInt(match[1]);
        if (day >= 1 && day <= 31 && !foundDates.includes(day)) {
          foundDates.push(day);
        }
      }

      foundDates.forEach(day => {
        addFreeDay(currentYear, currentMonth, day);
      });
    }

    function getNextOccurrenceOfDay(targetDay) {
      const today = new Date();
      let date = new Date(today);
      date.setDate(date.getDate() + 1);

      while (date.getDay() !== targetDay) {
        date.setDate(date.getDate() + 1);
      }

      return date;
    }

    function addFreeDay(year, month, day) {
      const key = `${year}-${month}-${day}`;
      if (!freeDays.find(d => d.key === key)) {
        freeDays.push({
          key,
          year,
          month,
          day,
          date: new Date(year, month, day)
        });
        saveToStorage();
      }
    }

    function removeFreeDay(key) {
      freeDays = freeDays.filter(d => d.key !== key);
      saveToStorage();
      renderCalendar();
      updateFreeList();
    }

    function renderCalendar() {
      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'];

      document.getElementById('monthYear').textContent = `${monthNames[currentMonth]} ${currentYear}`;

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

      const calendarContainer = document.getElementById('calendarDates');
      calendarContainer.innerHTML = '';

      for (let i = 0; i < firstDay; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.className = 'date-cell empty';
        calendarContainer.appendChild(emptyCell);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement('div');
        cell.className = 'date-cell';
        cell.textContent = day;

        const isFree = freeDays.some(d => d.year === currentYear && d.month === currentMonth && d.day === day);
        if (isFree) {
          cell.classList.add('free');
        }

        // Click to toggle
        cell.onclick = function () {
          const key = `${currentYear}-${currentMonth}-${day}`;
          const existing = freeDays.find(d => d.key === key);
          if (existing) {
            removeFreeDay(key);
          } else {
            addFreeDay(currentYear, currentMonth, day);
            renderCalendar();
            updateFreeList();
          }
        };

        calendarContainer.appendChild(cell);
      }
    }

    function updateFreeList() {
      const container = document.getElementById('freeItems');

      if (freeDays.length === 0) {
        container.innerHTML = '<div class="empty-state">No free days added yet</div>';
        return;
      }

      const sorted = [...freeDays].sort((a, b) => a.date - b.date);
      const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

      container.innerHTML = sorted.map(d => {
        const dayName = dayNames[d.date.getDay()];
        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const dateStr = `${dayName}, ${monthNames[d.month]} ${d.day}, ${d.year}`;
        return `<div class="free-item"><span class="free-item-text">${dateStr}</span><button class="free-item-remove" onclick="removeFreeDay('${d.key}')">✕</button></div>`;
      }).join('');
    }

    function previousMonth() {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      renderCalendar();
    }

    function nextMonth() {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      renderCalendar();
    }

    function clearAll() {
      if (confirm('Are you sure you want to clear all free days?')) {
        freeDays = [];
        saveToStorage();
        renderCalendar();
        updateFreeList();
      }
    }

    // Initialize
    loadFromStorage();
    renderCalendar();
  </script>
</body>

</html>
